# =========================================================
# DEFAULT PROFILE - runs instantly with an in-memory H2 database.
# Use this for quick local testing with zero setup.
# =========================================================
server.port=8080

spring.datasource.url=jdbc:h2:mem:ecommercedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Load sample data from data.sql after Hibernate creates the tables
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# H2 web console (open http://localhost:8080/h2-console while app is running)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# To switch to MySQL for real deployment, run with:
#   java -jar ecommerce-app.jar --spring.profiles.active=mysql
